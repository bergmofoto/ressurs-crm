<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ressurs CRM — Arbeidslivstjenester</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/lucide-static@0.344.0/font/lucide.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #fbfcfd;
    color: #16273d;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  button { font-family: inherit; }
  input, select, textarea {
    font-family: inherit;
    color: #16273d;
  }
  input:focus, select:focus, textarea:focus {
    border-color: #009fe3 !important;
    box-shadow: 0 0 0 3px rgba(0,159,227,0.12);
  }
  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #dde1e7; border-radius: 5px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: #c4cad4; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }
  /* Lucide icon vertical alignment */
  [class^="icon-"], [class*=" icon-"] { display: inline-block; vertical-align: middle; }

  /* Print: hjelpere brukt av Rapporter ----------------------------------- */
  @media print {
    @page { margin: 16mm; }
    html, body, #root { height: auto !important; overflow: visible !important; background: #fff !important; }
    body { overflow: visible !important; }
    aside { display: none !important; }
    main { overflow: visible !important; height: auto !important; background: #fff !important; }
    .no-print { display: none !important; }
    /* Container for rapporten skal flyte fritt på papiret */
    .report-area {
      box-shadow: none !important;
      border: none !important;
      border-radius: 0 !important;
    }
    /* Unngå brudd inni viktige seksjoner */
    .report-area > div { page-break-inside: avoid; }
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- Supabase JS SDK (UMD) — må lastes før Babel-scripts som bruker det -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<script src="seed.js"></script>
<script type="text/babel" src="helpers.jsx"></script>
<script type="text/babel" src="supabase-store.jsx"></script>
<script type="text/babel" src="Oversikt.jsx"></script>
<script type="text/babel" src="Kunder.jsx"></script>
<script type="text/babel" src="Tilbud.jsx"></script>
<script type="text/babel" src="Kundeprofil.jsx"></script>
<script type="text/babel" src="Pipeline.jsx"></script>
<script type="text/babel" src="Rapporter.jsx"></script>
<script type="text/babel" src="Intern.jsx"></script>
<script type="text/babel" src="Innstillinger.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
</body>
</html>
